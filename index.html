<!DOCTYPE html>
<html lang="ar">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">

    <title>مصمم القاعة</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>

</head>

<body>

    <header>

        <div class="actions">

            <div class="logo-container">
                <img src="logo.png" alt="Logo" class="main-logo">
            </div>

            <!-- التنقل الرئيسي -->
            <div id="mainNav" class="nav-section active">
                <button id="gridBtn" onclick="toggleGrid()" title="الشبكة"><span class="ic">🗺️</span><span
                        class="lb">الشبكة</span></button>

                <button class="nav-btn" onclick="showNavSection('zoomNav')" title="الزووم">
                    <span class="ic">🔍</span><span class="lb">الزووم</span>
                </button>

                <button class="nav-btn" onclick="showNavSection('tablesNav')" title="الطاولات">
                    <span class="ic">🍽️</span><span class="lb">الطاولات</span>
                </button>

                <button class="nav-btn" onclick="showNavSection('fileNav')" title="الملف">
                    <span class="ic">📁</span><span class="lb">الملف</span>
                </button>

                <!-- الأزرار الثابتة -->
                <button id="themeBtn" onclick="toggleTheme()" title="تبديل الوضع"><span class="ic">🌙</span><span
                        class="lb">الوضع</span></button>
                <button id="langBtn" onclick="toggleLanguage()" title="تبديل اللغة"><span class="ic">🌐</span><span
                        class="lb">اللغة</span></button>

            </div>

            <!-- قسم الزووم -->
            <div id="zoomNav" class="nav-section">
                <button class="back-btn" onclick="showNavSection('mainNav')" title="العودة">
                    <span class="ic">↩️</span><span class="lb">عودة</span>
                </button>
                <button onclick="zoomOut()" title="تصغير"><span class="ic">🔍➖</span><span
                        class="lb">تصغير</span></button>
                <button onclick="zoomIn()" title="تكبير"><span class="ic">🔍➕</span><span
                        class="lb">تكبير</span></button>
                <button onclick="fitToScreen()" title="ملاءمة"><span class="ic">🔲</span><span
                        class="lb">ملاءمة</span></button>
                <button onclick="resetView()" title="إعادة الضبط"><span class="ic">♻️</span><span class="lb">إعادة
                        الضبط</span></button>
            </div>

            <!-- قسم الطاولات -->
            <div id="tablesNav" class="nav-section">
                <button class="back-btn" onclick="showNavSection('mainNav')" title="العودة">
                    <span class="ic">↩️</span><span class="lb">عودة</span>
                </button>
                <button onclick="toggleAddMenu()" title="إضافة طاولة"><span class="ic">➕</span><span class="lb">إضافة
                        طاولة</span></button>
                <button onclick="deleteSelectedTable()" title="حذف طاولة"><span class="ic">🗑️</span><span
                        class="lb">حذف طاولة</span></button>
                <button onclick="toggleReservationForSelectedTable()" title="حجز الطاولة"><span
                        class="ic">🔓</span><span class="lb">حجز طاولة</span></button>
                <button onclick="toggleDrawer()" title="معلومات الطاولة"><span class="ic">🧾</span><span
                        class="lb">معلومات الطاولة</span></button>
            </div>

            <!-- قسم الملف -->
            <div id="fileNav" class="nav-section">
                <button class="back-btn" onclick="showNavSection('mainNav')" title="العودة">
                    <span class="ic">↩️</span><span class="lb">عودة</span>
                </button>
                <button onclick="saveDesign()" title="حفظ التصميم"><span class="ic">💾</span><span class="lb">حفظ
                        التصميم</span></button>
                <button onclick="loadDesign()" title="تحميل التصميم"><span class="ic">📂</span><span class="lb">تحميل
                        التصميم</span></button>
                <button onclick="exportJSONFile()" title="تصدير JSON"><span class="ic">⬇️</span><span class="lb">تصدير
                        JSON</span></button>
                <button onclick="importJSONFile()" title="استيراد JSON"><span class="ic">⬆️</span><span
                        class="lb">استيراد JSON</span></button>
                <button onclick="exportImage()" title="تصدير صورة"><span class="ic">🖼️</span><span class="lb">تصدير
                        صورة</span></button>
            </div>

            <div class="stats-inline">
                <span><span id="tableLabel">الطاولات</span>: <span id="tableCount">0</span></span>
                <span class="sep">|</span>
                <span><span id="seatLabel">الكراسي</span>: <span id="seatCount">0</span></span>
                <span class="sep">|</span>
                <span><span id="reservedTableLabel">محجوز طاولات</span>: <span id="reservedTableCount">0</span></span>
                <span class="sep">|</span>
                <span><span id="reservedSeatLabel">محجوز كراسي</span>: <span id="reservedSeatCount">0</span></span>
            </div>

        </div>

    </header>

    <div class="layout">

        <!-- القاعة -->

        <main>

            <canvas id="canvas"></canvas>

        </main>

    </div>

    <div id="drawerOverlay" class="drawer-overlay"></div>
    <aside id="drawer" class="drawer">
        <div class="drawer-header">
            <h3 id="drawerTitle">معلومات الطاولة</h3>
            <div class="mini-stats">
                <span><span id="tableLabelDrawer">الطاولات</span>: <span id="tableCountDrawer">0</span></span>
                <span class="sep">|</span>
                <span><span id="seatLabelDrawer">الكراسي</span>: <span id="seatCountDrawer">0</span></span>
                <span class="sep">|</span>
                <span><span id="reservedTableLabelDrawer">محجوز طاولات</span>: <span
                        id="reservedTableCountDrawer">0</span></span>
                <span class="sep">|</span>
                <span><span id="reservedSeatLabelDrawer">محجوز كراسي</span>: <span
                        id="reservedSeatCountDrawer">0</span></span>
            </div>
        </div>
        <div class="drawer-content">
            <div class="field">
                <label>رقم الطاولة</label>
                <div id="infoTableNumber">—</div>
            </div>
            <div class="field">
                <label id="labelName" for="infoName">اسم العميل</label>
                <input id="infoName" type="text" placeholder="مثال: أحمد علي" />
            </div>
            <div class="field">
                <label id="labelPhone" for="infoPhone">رقم الهاتف</label>
                <input id="infoPhone" type="tel" placeholder="05xxxxxxxx" />
            </div>
            <div class="field">
                <label id="labelGuests" for="infoGuests">عدد الضيوف</label>
                <input id="infoGuests" type="number" min="0" step="1" placeholder="0" />
            </div>
            <div class="field">
                <label id="labelNotes" for="infoNotes">ملاحظات</label>
                <textarea id="infoNotes" rows="3" placeholder="ملاحظات إضافية"></textarea>
            </div>
            <div class="actions-row">
                <button id="infoSaveBtn" title="حفظ">💾 <span id="infoSaveText">حفظ</span></button>
                <button id="infoClearBtn" class="danger" title="مسح">🗑️ <span id="infoClearText">مسح</span></button>
            </div>
            <p id="infoHint" class="hint">اختر طاولة من القاعة لتحرير معلوماتها.</p>
        </div>
    </aside>

    <div id="addMenu" class="floating-menu" style="display:none">
        <button class="addMenuItem" data-seats="4" onclick="addTable(120,4)">طاولة 4</button>
        <button class="addMenuItem" data-seats="8" onclick="addTable(240,8)">طاولة 8</button>
        <button class="addMenuItem" data-seats="12" onclick="addTable(360,12)">طاولة 12</button>
        <button class="addMenuItem" data-seats="16" onclick="addTable(460,16)">طاولة 16</button>
        <button class="addMenuItem" data-seats="24" onclick="addTable(720,24)">طاولة 24</button>
    </div>

    <input type="file" id="jsonFile" accept="application/json" style="display:none" />

    <script src="script.js"></script>

</body>

</html>
