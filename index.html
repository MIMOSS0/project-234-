<!DOCTYPE html>
<html lang="ar">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">

    <title>مصمم القاعة</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>

</head>

<body>

    <header>

        <div class="actions">

            <button onclick="toggleGrid()" title="الشبكة"><span class="ic">🗺️</span><span
                    class="lb">الشبكة</span></button>

            <button onclick="zoomOut()" title="تصغير"><span class="ic"><svg viewBox="0 0 24 24" width="18" height="18"
                        aria-hidden="true">
                        <circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" />
                        <line x1="8" y1="11" x2="14" y2="11" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" />
                    </svg></span><span class="lb">تصغير</span></button>
            <button onclick="zoomIn()" title="تكبير"><span class="ic"><svg viewBox="0 0 24 24" width="18" height="18"
                        aria-hidden="true">
                        <circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" />
                        <line x1="11" y1="8" x2="11" y2="14" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" />
                        <line x1="8" y1="11" x2="14" y2="11" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" />
                    </svg></span><span class="lb">تكبير</span></button>
            <button onclick="fitToScreen()" title="ملاءمة"><span class="ic">🔲</span><span
                    class="lb">ملاءمة</span></button>
            <button class="danger" onclick="resetView()" title="إعادة الضبط"><span class="ic">♻️</span><span
                    class="lb">إعادة الضبط</span></button>

            <button class="danger" onclick="deleteSelectedTable()" title="حذف طاولة"><span class="ic">🗑️</span><span
                    class="lb">حذف
                    طاولة</span></button>
            <div id="addDropdown" class="dropdown">
                <button id="addBtn" onclick="toggleAddMenu()" title="إضافة"><span class="ic">➕</span><span
                        class="lb">إضافة</span></button>
            </div>

            <button onclick="saveDesign()" title="حفظ"><span class="ic">💾</span><span class="lb">حفظ</span></button>
            <button onclick="loadDesign()" title="تحميل"><span class="ic">📂</span><span
                    class="lb">تحميل</span></button>
            <button onclick="exportJSONFile()" title="تصدير"><span class="ic">⬇️</span><span
                    class="lb">تصدير</span></button>
            <button onclick="importJSONFile()" title="استيراد"><span class="ic">⬆️</span><span
                    class="lb">استيراد</span></button>

            <button onclick="exportImage()" title="تصدير صورة"><span class="ic">🖼️</span><span
                    class="lb">صورة</span></button>
            <button id="themeBtn" onclick="toggleTheme()" title="تبديل الوضع"><span class="ic">🌙</span><span
                    class="lb">الوضع</span></button>

            <div class="stats-inline">
                <span>الطاولات: <span id="tableCount">0</span></span>
                <span class="sep">|</span>
                <span>الكراسي: <span id="seatCount">0</span></span>
            </div>

        </div>

    </header>

    <div class="layout">

        <!-- القاعة -->

        <main>

            <canvas id="canvas"></canvas>

        </main>

    </div>

    <div id="addMenu" class="floating-menu" style="display:none">
        <button onclick="addTable(120,4)">طاولة 4</button>
        <button onclick="addTable(240,8)">طاولة 8</button>
        <button onclick="addTable(360,12)">طاولة 12</button>
        <button onclick="addTable(460,16)">طاولة 16</button>
        <button onclick="addTable(720,24)">طاولة 24</button>
    </div>

    <input type="file" id="jsonFile" accept="application/json" style="display:none" />

    <script src="script.js"></script>

</body>

</html>
